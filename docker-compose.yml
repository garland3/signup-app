services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signup
      POSTGRES_PASSWORD: signup
      POSTGRES_DB: signup_app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signup -d signup_app"]
      interval: 5s
      timeout: 3s
      retries: 5

  signup-app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
