services:
  litellm-mock:
    build: .
    command: ["python", "-m", "uvicorn", "mocks.litellm_mock:app", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  signup-app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      litellm-mock:
        condition: service_healthy
