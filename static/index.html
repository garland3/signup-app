<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-root-path" content="{{ROOT_PATH}}">
    <title>API Keys</title>
    <link rel="stylesheet" href="{{ROOT_PATH}}/static/style.css">
</head>
<body>
    <div class="container">
        <h1 id="app-title" class="app-title">API Keys</h1>
        <nav id="nav-links" class="nav-links hidden"></nav>
        <header>
            <span id="user-email"></span>
        </header>

        <div class="actions">
            <button id="create-btn">Create new key</button>
        </div>

        <table id="keys-table">
            <thead>
                <tr id="keys-table-head">
                    <th>Name</th>
                    <th>Key</th>
                    <th>Created</th>
                    <th>Duration</th>
                    <th>Spend</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="keys-body"></tbody>
        </table>

        <p id="no-keys" class="hidden">No API keys yet. Create one to get started.</p>
    </div>

    <!-- Create Key Modal -->
    <div id="create-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Create API Key</h2>
            <label for="key-name">Name</label>
            <input type="text" id="key-name" placeholder="e.g. Production Server">
            <label for="key-duration">Duration (optional)</label>
            <input type="text" id="key-duration" placeholder="e.g. 30d, 90d, 1y">
            <label for="key-budget">Max Budget $ (optional)</label>
            <input type="number" id="key-budget" placeholder="e.g. 100" step="0.01">
            <div id="required-metadata-fields"></div>
            <div class="modal-actions">
                <button id="create-cancel-btn">Cancel</button>
                <button id="create-submit-btn" class="primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Show Key Modal (one-time display) -->
    <div id="show-key-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Your API Key</h2>
            <p class="warning">Copy this key now. You will not be able to see it again.</p>
            <div class="key-display">
                <code id="full-key"></code>
                <button id="copy-key-btn">Copy</button>
            </div>
            <div class="modal-actions">
                <button id="show-key-done-btn" class="primary">Done</button>
            </div>
        </div>
    </div>

    <script src="{{ROOT_PATH}}/static/app.js"></script>
</body>
</html>
